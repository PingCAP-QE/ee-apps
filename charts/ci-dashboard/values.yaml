replicaCount: 1

image:
  repository: ghcr.io/pingcap-qe/ee-apps/ci-dashboard
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

containerPort: 8000

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - kind: Gateway
      name: external-https
      namespace: infra
  hostnames:
    - prow.tidb.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /dashboard
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /

env:
  - name: CI_DASHBOARD_LOG_LEVEL
    value: INFO

secretEnvFrom: []

ssl:
  caSecretName: ""
  caSecretKey: ca.crt
  mountPath: /var/run/ci-dashboard/ssl

command: []
args: []

extraVolumeMounts: []
extraVolumes: []

resources: {}

livenessProbe:
  httpGet:
    path: /livez
    port: http

readinessProbe:
  httpGet:
    path: /readyz
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage:

nodeSelector: {}

tolerations: []

affinity: {}
