# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Test and Build - tibuild-v2

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/tibuild-v2.yaml
      - "experiments/tibuild-v2/**/*.go"
      - "experiments/tibuild-v2/**/go.mod"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build experiments/tibuild-v2
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: "0"
          fetch-tags: "true"
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: experiments/tibuild-v2/go.mod

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        working-directory: experiments/tibuild-v2
        run: |
          go test -v ./...
      - name: Run builds
        working-directory: experiments/tibuild-v2
        run: |
          go build ./cmd/tibuild && \
          go build ./cmd/tibuild-cli
