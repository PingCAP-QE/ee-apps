swagger: "2.0"
info:
    title: TiBuild API
    description: TiBuild API
    contact:
        name: Flare Zuo
        email: wuhui.zuo@pingcap.com
        url: https://github.com/wuhuizuo
    version: 2.0.0
host: localhost:8080
basePath: /api/v2
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /artifact/sync-image:
        post:
            tags:
                - artifact
            summary: syncImage artifact
            description: Sync hotfix image to dockerhub
            operationId: artifact#syncImage
            parameters:
                - name: SyncImageRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/ImageSyncRequest'
                    required:
                        - source
                        - target
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/ImageSyncRequest'
                        required:
                            - source
                            - target
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
    /devbuilds:
        get:
            tags:
                - devbuild
            summary: list devbuild
            description: List devbuild with pagination support
            operationId: devbuild#list
            parameters:
                - name: page
                  in: query
                  description: The page number of items
                  required: false
                  type: integer
                  format: int64
                  default: 1
                - name: pageSize
                  in: query
                  description: Page size
                  required: false
                  type: integer
                  format: int64
                  default: 30
                - name: hotfix
                  in: query
                  description: Filter hotfix
                  required: false
                  type: boolean
                  default: false
                - name: sort
                  in: query
                  description: What to sort results by
                  required: false
                  type: string
                  default: createdAt
                  enum:
                    - createdAt
                    - updatedAt
                - name: direction
                  in: query
                  description: The direction of the sort
                  required: false
                  type: string
                  default: desc
                  enum:
                    - asc
                    - desc
                - name: createdBy
                  in: query
                  description: Filter created by
                  required: false
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/DevBuild'
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
        post:
            tags:
                - devbuild
            summary: create devbuild
            description: Create and trigger devbuild
            operationId: devbuild#create
            parameters:
                - name: dryrun
                  in: query
                  description: Dry run
                  required: false
                  type: boolean
                  default: false
                - name: CreateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/DevbuildCreateRequestBody'
                    required:
                        - createdBy
                        - request
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DevBuild'
                        required:
                            - id
                            - meta
                            - spec
                            - status
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
    /devbuilds/{id}:
        get:
            tags:
                - devbuild
            summary: get devbuild
            description: Get devbuild
            operationId: devbuild#get
            parameters:
                - name: sync
                  in: query
                  description: Whether sync with jenkins
                  required: false
                  type: boolean
                  default: false
                - name: id
                  in: path
                  description: ID of build
                  required: true
                  type: integer
                  format: int64
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DevBuild'
                        required:
                            - id
                            - meta
                            - spec
                            - status
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
        put:
            tags:
                - devbuild
            summary: update devbuild
            description: Update devbuild status
            operationId: devbuild#update
            parameters:
                - name: dryrun
                  in: query
                  description: Dry run
                  required: false
                  type: boolean
                  default: false
                - name: id
                  in: path
                  description: ID of build
                  required: true
                  type: integer
                  format: int64
                - name: UpdateRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/DevbuildUpdateRequestBody'
                    required:
                        - status
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DevBuild'
                        required:
                            - id
                            - meta
                            - spec
                            - status
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
    /devbuilds/{id}/rerun:
        post:
            tags:
                - devbuild
            summary: rerun devbuild
            description: Rerun devbuild
            operationId: devbuild#rerun
            parameters:
                - name: dryrun
                  in: query
                  description: Dry run
                  required: false
                  type: boolean
                  default: false
                - name: id
                  in: path
                  description: ID of build
                  required: true
                  type: integer
                  format: int64
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/DevBuild'
                        required:
                            - id
                            - meta
                            - spec
                            - status
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
    /hotfix/bump-tag-for-tidbx:
        post:
            tags:
                - hotfix
            summary: bump-tag-for-tidbx hotfix
            description: Create a hot fix git tag for a GitHub repository
            operationId: hotfix#bump-tag-for-tidbx
            parameters:
                - name: Bump-Tag-For-TidbxRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/HotfixBumpTagForTidbxRequestBody'
                    required:
                        - repo
                        - author
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/HotfixTagResult'
                        required:
                            - repo
                            - commit
                            - tag
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
    /hotfix/tidbx/bump-tag:
        post:
            tags:
                - hotfix
            summary: bump-tag-for-tidbx hotfix
            description: Create a hot fix git tag for a GitHub repository
            operationId: hotfix#bump-tag-for-tidbx#1
            parameters:
                - name: Bump-Tag-For-TidbxRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/HotfixBumpTagForTidbxRequestBody'
                    required:
                        - repo
                        - author
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/HotfixTagResult'
                        required:
                            - repo
                            - commit
                            - tag
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
    /hotfix/tidbx/tag:
        get:
            tags:
                - hotfix
            summary: query-tag-of-tidbx hotfix
            description: Query tag info of tidbx repo
            operationId: hotfix#query-tag-of-tidbx
            parameters:
                - name: repo
                  in: query
                  description: Full name of GitHub repository (e.g., 'owner/repo')
                  required: true
                  type: string
                - name: tag
                  in: query
                  description: Tag name of the GitHub repo
                  required: true
                  type: string
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/HotfixTagResult'
                        required:
                            - repo
                            - commit
                            - tag
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
                "500":
                    description: Internal Server Error response.
                    schema:
                        $ref: '#/definitions/HTTPError'
                        required:
                            - code
                            - message
            schemes:
                - http
