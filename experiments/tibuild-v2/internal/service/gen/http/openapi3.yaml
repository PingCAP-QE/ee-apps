info:
    title: TiBuild API
    description: TiBuild API
    contact:
        name: Flare Zuo
        url: https://github.com/wuhuizuo
        email: wuhui.zuo@pingcap.com
    version: 2.0.0
servers:
    - url: http://localhost:8080
    - url: http://0.0.0.0:8080
paths:
    /api/v2/artifact/sync-image:
        post:
            tags:
                - artifact
            summary: syncImage artifact
            description: Sync hotfix image to dockerhub
            operationId: artifact#syncImage
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ImageSyncRequest'
                        example:
                            source: Quod ut eum deleniti.
                            target: Reprehenderit nihil animi.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ImageSyncRequest'
                            example:
                                source: Fugiat et accusamus velit.
                                target: Voluptatum enim harum dolorum natus.
                "400":
                    description: 'BadRequest: Bad Request'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPError'
                            example:
                                code: 2788046860156768969
                                message: Rerum dicta excepturi ipsa veniam.
                "500":
                    description: 'InternalServerError: Internal Server Error'
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/HTTPError'
                            example:
                                code: 3429267008736401987
                                message: Harum voluptatem enim aliquam.
    /api/v2/devbuilds:
        get:
            tags:
                - devbuild
            summary: list devbuild
            description: List devbuild with pagination support
            operationId: devbuild#list
            parameters:
                - name: page
                  in: query
                  description: The page number of items
                  allowEmptyValue: true
                  schema:
                    type: integer
                    description: The page number of items
                    default: 1
                    example: 1146193315588500825
                    format: int64
                  example: 3779549693207762565
                - name: pageSize
                  in: query
                  description: Page size
                  allowEmptyValue: true
                  schema:
                    type: integer
                    description: Page size
                    default: 30
                    example: 7548699418503417373
                    format: int64
                  example: 4716711665526144399
                - name: hotfix
                  in: query
                  description: Filter hotfix
                  allowEmptyValue: true
                  schema:
                    type: boolean
                    description: Filter hotfix
                    default: false
                    example: false
                  example: true
                - name: sort
                  in: query
                  description: What to sort results by
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: What to sort results by
                    default: createdAt
                    example: createdAt
                    enum:
                        - createdAt
                        - updatedAt
                  example: updatedAt
                - name: direction
                  in: query
                  description: The direction of the sort
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: The direction of the sort
                    default: desc
                    example: desc
                    enum:
                        - asc
                        - desc
                  example: asc
                - name: createdBy
                  in: query
                  description: Filter created by
                  allowEmptyValue: true
                  schema:
                    type: string
                    description: Filter created by
                    example: Est et est ut accusantium.
                  example: Neque sed nobis voluptate eius aut.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/DevBuild'
                                description: List of dev builds
