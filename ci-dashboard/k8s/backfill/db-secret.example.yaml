apiVersion: v1
kind: Secret
metadata:
  name: ci-dashboard-eq-prd-insight-db
  namespace: apps
type: Opaque
stringData:
  TIDB_HOST: "<replace-with-tidb-host>"
  TIDB_PORT: "4000"
  TIDB_USER: "<replace-with-tidb-user>"
  TIDB_PASSWORD: "<replace-with-tidb-password>"
  TIDB_DB: "<replace-with-database-name>"
  # Alternative: remove the fields above and use a single SQLAlchemy URL instead.
  # CI_DASHBOARD_DB_URL: "mysql+pymysql://user:password@host:4000/database?charset=utf8mb4"
